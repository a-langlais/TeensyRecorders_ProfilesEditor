name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      sign:
        type: boolean
        default: false
        description: "Sign and notarize the macOS build"

permissions:
  contents: write

env:
  SHOULD_SIGN: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.sign) }}

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-latest
          - arch: x86_64
            runner: macos-15-intel
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Import Apple Developer Certificate
        if: env.SHOULD_SIGN == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain
          rm certificate.p12

      - name: Build .app with PyInstaller
        env:
          APPLE_SIGNING_IDENTITY: ${{ env.SHOULD_SIGN == 'true' && secrets.APPLE_SIGNING_IDENTITY || '' }}
        run: uv run pyinstaller TeensyProfilesEditor.spec --noconfirm --clean

      - name: Notarize and staple
        if: env.SHOULD_SIGN == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -c -k --keepParent "dist/TeensyProfilesEditor.app" notarize.zip
          xcrun notarytool submit notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 900 2>&1 | tee notarize_output.txt
          if ! grep -q "status: Accepted" notarize_output.txt; then
            SUBMISSION_ID=$(grep -oE '[0-9a-f-]{36}' notarize_output.txt | head -1)
            if [ -n "$SUBMISSION_ID" ]; then
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_PASSWORD" \
                --team-id "$APPLE_TEAM_ID"
            fi
            exit 1
          fi
          xcrun stapler staple "dist/TeensyProfilesEditor.app"
          rm -f notarize.zip notarize_output.txt

      - name: Package signed app for distribution
        run: ditto -c -k --keepParent "dist/TeensyProfilesEditor.app" "TeensyProfilesEditor-${{ matrix.arch }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TeensyProfilesEditor-${{ matrix.arch }}
          path: TeensyProfilesEditor-${{ matrix.arch }}.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Build .exe with PyInstaller
        run: uv run pyinstaller TeensyProfilesEditor.spec --noconfirm --clean

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TeensyProfilesEditor-windows
          path: dist/TeensyProfilesEditor.exe

  release:
    needs: [build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/TeensyProfilesEditor-*.zip
            artifacts/TeensyProfilesEditor.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
